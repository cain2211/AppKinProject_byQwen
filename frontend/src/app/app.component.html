<mat-sidenav-container class="app-container" autosize>
  <mat-sidenav #sidenav mode="side" [opened]="showSidebar" class="app-sidenav">
    <div class="sidenav-header">
      <mat-icon>folder_open</mat-icon>
      <span>Project Manager</span>
    </div>
    
    <mat-nav-list>
      <a mat-list-item routerLink="/dashboard">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Dashboard</span>
      </a>
      
      <a mat-list-item routerLink="/projects">
        <mat-icon matListItemIcon>folder</mat-icon>
        <span matListItemTitle>Proyectos</span>
      </a>
      
      <mat-divider></mat-divider>
      
      <h3 matSubheader>Vistas</h3>
      
      <a mat-list-item routerLink="/projects/board">
        <mat-icon matListItemIcon>view_kanban</mat-icon>
        <span matListItemTitle>Tablero (Kanban)</span>
      </a>
      
      <a mat-list-item routerLink="/projects/gantt">
        <mat-icon matListItemIcon>timeline</mat-icon>
        <span matListItemTitle>Diagrama de Gantt</span>
      </a>
      
      <a mat-list-item routerLink="/projects/table">
        <mat-icon matListItemIcon>table_chart</mat-icon>
        <span matListItemTitle>Tabla</span>
      </a>
      
      <mat-divider></mat-divider>
      
      <a mat-list-item routerLink="/auth/login">
        <mat-icon matListItemIcon>account_circle</mat-icon>
        <span matListItemTitle>Cuenta</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary" class="app-toolbar">
      <button mat-icon-button (click)="toggleSidebar()">
        <mat-icon>menu</mat-icon>
      </button>
      <span>{{ title }}</span>
      <span class="toolbar-spacer"></span>
      <button mat-icon-button>
        <mat-icon>notifications</mat-icon>
      </button>
      <button mat-icon-button>
        <mat-icon>account_circle</mat-icon>
      </button>
    </mat-toolbar>

    <main class="app-content">
      <router-outlet></router-outlet>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
